name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Build
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ex Additional Compat ${{ steps.version.outputs.version }}
          body: |
            ## Ex Additional Compat ${{ steps.version.outputs.version }}

            Minecraft 1.18.2 / Forge 40.2.10

            ### Installation
            1. Download the JAR file below
            2. Place it in your `mods/` folder
            3. Requires: Forge 40.2.10+, Java 17+
          files: build/libs/ex_additional_compat-${{ steps.version.outputs.version }}.jar
          draft: false
          prerelease: false
          generate_release_notes: true
